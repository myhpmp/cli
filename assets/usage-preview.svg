<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340">
  <defs>
    <style>
      .terminal-bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .dot-red { fill: #f38ba8; }
      .dot-yellow { fill: #f9e2af; }
      .dot-green { fill: #a6e3a1; }
      .title-text { fill: #6c7086; font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 12px; }
      .t { fill: #cdd6f4; font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 14px; }
      .dim { fill: #6c7086; font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 14px; }
      .bar-bg { fill: #313244; }
      .bar-red { fill: #f38ba8; }
      .bar-blue { fill: #89b4fa; }
      .bar-purple { fill: #cba6f7; }
      .bar-yellow { fill: #f9e2af; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="terminal-bg" width="640" height="340" rx="10"/>

  <!-- Title bar -->
  <rect class="titlebar" width="640" height="36" rx="10"/>
  <rect class="titlebar" y="10" width="640" height="26"/>
  <circle class="dot-red" cx="20" cy="18" r="6"/>
  <circle class="dot-yellow" cx="40" cy="18" r="6"/>
  <circle class="dot-green" cx="60" cy="18" r="6"/>
  <text class="title-text" x="320" y="22" text-anchor="middle">myhpmp usage</text>

  <!-- Header -->
  <text class="t" x="24" y="70">&#x1F3AE; &#x1F52E; Prompt Sorcerer Lv.21 &#x2605;                &#x1F525; Streak: 5d</text>
  <text class="dim" x="24" y="90">&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;</text>

  <!-- HP bar -->
  <text class="t" x="24" y="118">&#x2764;&#xFE0F; HP</text>
  <rect class="bar-bg" x="80" y="104" width="200" height="16" rx="3"/>
  <rect class="bar-red" x="80" y="104" width="82" height="16" rx="3"/>
  <text class="t" x="292" y="118">41%  &#x23F1;&#xFE0F; 2h35m</text>

  <!-- MP bar -->
  <text class="t" x="24" y="148">&#x1F499; MP</text>
  <rect class="bar-bg" x="80" y="134" width="200" height="16" rx="3"/>
  <rect class="bar-blue" x="80" y="134" width="122" height="16" rx="3"/>
  <text class="t" x="292" y="148">61%</text>

  <!-- CTX bar -->
  <text class="t" x="24" y="178">&#x1F9E0; CTX</text>
  <rect class="bar-bg" x="80" y="164" width="200" height="16" rx="3"/>
  <rect class="bar-purple" x="80" y="164" width="4" height="16" rx="3"/>
  <text class="t" x="292" y="178">2%   (20K / 1.0M context)</text>

  <!-- EXP bar -->
  <text class="t" x="24" y="208">&#x2B50; EXP</text>
  <rect class="bar-bg" x="80" y="194" width="200" height="16" rx="3"/>
  <rect class="bar-yellow" x="80" y="194" width="64" height="16" rx="3"/>
  <text class="t" x="292" y="208">32%  (1115 / 3500 &#x2192; Lv.22)</text>

  <!-- Separator -->
  <text class="dim" x="24" y="238">&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;&#x2501;</text>

  <!-- Stats -->
  <text class="t" x="24" y="268">&#x1F4CA; Total EXP: 12,115  |  Sessions: 507</text>
  <text class="t" x="24" y="298">&#x2601;&#xFE0F;  Sync: Active</text>
</svg>
